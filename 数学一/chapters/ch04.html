    <div class="ch-content">

        <div class="must-card">
            <div class="must-label">📖 基本公式</div>
            <ul>
                <li><strong>向量点积</strong>：a·b = |a||b|cosθ = x₁x₂ + y₁y₂ + z₁z₂</li>
                <li><strong>向量叉积</strong>：a×b = (y₁z₂ - z₁y₂, z₁x₂ - x₁z₂, x₁y₂ - y₁x₂)</li>
                <li><strong>平面方程</strong>：Ax + By + Cz + D = 0（法向量 n = (A,B,C)）</li>
                <li><strong>直线方程（点向式）</strong>：(x-x₀)/m = (y-y₀)/n = (z-z₀)/p</li>
                <li><strong>点到平面距离</strong>：d = |Ax₀+By₀+Cz₀+D| / √(A²+B²+C²)</li>
            </ul>
        </div>
    </div>
</section>

<section class="chapter-card" id="ch05">
    <div class="ch-header">
        <div class="ch-title">第五章：多元函数微分学 <span class="ch-score">| 8分</span></div>
        <div class="ch-stars star-high">★★★★</div>
    </div>
    <div class="ch-content">
        <p><span class="section-tag tag-core">🎯 核心考点</span></p>
        <ul>
            <li>偏导数计算、全微分</li>
            <li>无条件极值（多元函数极值判定）</li>
        </ul>
        <div class="must-card">
            <div class="must-label">📖 必背：求偏导法则</div>
            <p><strong>对 x 求偏导</strong>：将 y 视为常数，对 x 求导</p>
            <p><strong>对 y 求偏导</strong>：将 x 视为常数，对 y 求导</p>
            <div class="formula-box">∂z/∂x = f<sub>x</sub>(x,y) &nbsp;&nbsp; ∂z/∂y = f<sub>y</sub>(x,y)</div>
        </div>
        <div class="example-card">
            <div class="example-label">📝 例题</div>
            <div class="example-question">求 z = x²y + xy² 的偏导 ∂z/∂x 和 ∂z/∂y</div>
            <div class="example-hint">对 x 求偏导时把 y 当常数：∂z/∂x = <strong>2xy + y²</strong>；对 y 求偏导时把 x 当常数：∂z/∂y = <strong>x² + 2xy</strong></div>
        </div>
    </div>
</section>

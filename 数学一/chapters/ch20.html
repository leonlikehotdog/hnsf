<section class="chapter-card" id="ch20">
    <div class="ch-header">
        <div class="ch-title">第二十章：数理统计的基本概念 <span class="ch-score">| 4分</span></div>
        <div class="ch-stars star-low">★★</div>
    </div>
    <div class="ch-content">
        <p><span class="section-tag tag-core">🎯 核心概念</span></p>
        <ul>
            <li><strong>样本均值</strong>：X̄ = (1/n)∑X<sub>i</sub></li>
            <li><strong>样本方差</strong>：S² = (1/(n-1))∑(X<sub>i</sub> - X̄)²</li>
        </ul>
        <div class="must-card">
            <div class="must-label">📖 三大抽样分布</div>
            <ul>
                <li><strong>χ² 分布</strong>：若 X<sub>i</sub> ~ N(0,1) 独立，则 ∑X<sub>i</sub>² ~ χ²(n)</li>
                <li><strong>t 分布</strong>：若 X ~ N(0,1)，Y ~ χ²(n) 独立，则 X/√(Y/n) ~ t(n)</li>
                <li><strong>F 分布</strong>：若 U ~ χ²(n₁)，V ~ χ²(n₂) 独立，则 (U/n₁)/(V/n₂) ~ F(n₁, n₂)</li>
            </ul>
        </div>
    </div>
</section>

        <div class="ch-title">第十七章：多维随机变量及其分布 <span class="ch-score">| 6分</span></div>
        <div class="ch-stars star-low">★★</div>
    </div>
    <div class="ch-content">
        <p><span class="section-tag tag-core">🎯 核心概念</span></p>
        <ul>
            <li><strong>二维随机变量 (X,Y)</strong>：联合分布函数 F(x,y) = P(X≤x, Y≤y)</li>
            <li><strong>边缘分布</strong>：f<sub>X</sub>(x) = ∫f(x,y)dy，f<sub>Y</sub>(y) = ∫f(x,y)dx</li>
            <li><strong>独立性</strong>：X 与 Y 独立 ⟺ f(x,y) = f<sub>X</sub>(x)·f<sub>Y</sub>(y)</li>
            <li><strong>协方差</strong>：Cov(X,Y) = E(XY) - E(X)E(Y)</li>
        </ul>
    </div>
</section>

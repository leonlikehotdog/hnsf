<section class="chapter-card" id="ch11">
    <div class="ch-header">
        <div class="ch-title">第十一章：向量 <span class="ch-score">| 6分</span></div>
        <div class="ch-stars star-high">★★★</div>
    </div>
    <div class="ch-content">
        <p><span class="section-tag tag-core">🎯 核心考点</span></p>
        <ul>
            <li>向量组的线性相关性（线性相关/无关判定）</li>
            <li>极大无关组与向量组的秩</li>
        </ul>
        <div class="must-card">
            <div class="must-label">📖 关键概念</div>
            <ul>
                <li><strong>线性相关</strong>：存在一组不全为零的系数使 k₁α₁ + k₂α₂ + ... + kₙαₙ = 0</li>
                <li><strong>线性无关</strong>：只有当所有系数全为零时才成立</li>
                <li><strong>判定方法</strong>：将向量组列排成矩阵，求秩 r。若 r < 向量个数，则线性相关；若 r = 向量个数，则线性无关</li>
                <li><strong>极大无关组</strong>：向量组中选出 r 个线性无关的向量，且任意向量都可被它们线性表示</li>
            </ul>
        </div>
    </div>
</section>

            <table>
                <thead><tr><th>算法</th><th>数据结构</th><th>适用场景</th></tr></thead>
                <tbody>
                    <tr><td>BFS（广度优先）</td><td>队列</td><td>最短路径、层序遍历</td></tr>
                    <tr><td>DFS（深度优先）</td><td>栈/递归</td><td>连通分量、拓扑排序</td></tr>

        <div class="must-card">
            <div class="must-label">📖 必背：Prim vs Kruskal</div>
            <ul>
                <li><strong>Prim：</strong>从某顶点出发，每次选离当前树最近的点加入。适用于边稠密图。</li>
                <li><strong>Kruskal：</strong>每次选权值最小的边，若不形成回路就加入。适用于边稀疏图。</li>
            </ul>
        </div>
